<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 16px;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #333;
    }
    .bang-form {
      background: #fff;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    input {
      flex: 1;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #666;
    }
    button {
      padding: 8px 16px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #555;
    }
    .bangs-list {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
    }
    .bang-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid #eee;
    }
    .bang-item:last-child {
      border-bottom: none;
    }
    .bang-info {
      flex: 1;
    }
    .bang-keyword {
      font-weight: 600;
      color: #333;
    }
    .bang-keyword::before {
      content: ':';
      margin-right: 4px;
      color: #999;
    }
    .bang-keyword {
      display: inline;
    }
    .bang-keyword {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 3px;
      margin-right: 8px;
    }
    .bang-name {
      color: #666;
      font-size: 13px;
    }
    .delete-btn {
      background: none;
      color: #999;
      padding: 4px 8px;
    }
    .delete-btn:hover {
      background: #fee;
      color: #c00;
    }
    .help {
      margin-top: 16px;
      padding: 12px;
      background: #fff;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
    }
    .help code {
      background: #eee;
      padding: 2px 4px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h1>Custom Bangs</h1>
  
  <div class="bang-form">
    <div class="form-row">
      <input type="text" id="name" placeholder="Name (e.g. Google)">
      <input type="text" id="keyword" placeholder="Keyword (e.g. g)" style="width: 80px;">
    </div>
    <div class="form-row">
      <input type="text" id="url" placeholder="URL with %s for query">
    </div>
    <button id="addBtn">Add Bang</button>
  </div>
  
  <div class="bangs-list" id="bangsList"></div>
  
  <div class="help">
    <strong>How to use:</strong><br>
    Type <code>g search term</code> in the address bar to search.<br>
    The extension handles the keyword detection.
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
